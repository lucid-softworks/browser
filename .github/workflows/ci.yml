name: CI

on:
  pull_request:
  push:
    branches: [main]
    # Release tags (release-plz pushes these) run the cross-platform `test` matrix — see its `if`.
    tags: ['v*']

# A new push to a PR cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Swatinem/rust-cache caches the *dependencies* in target/ but deliberately evicts the workspace
  # crates' own artifacts before saving — so every run otherwise recompiles all 11 crates from
  # scratch (the ~1m the build takes). sccache is a content-addressed compiler cache: each rustc
  # invocation (incl. the per-crate --test harness builds) is keyed by its inputs and stored in the
  # GitHub Actions cache, so unchanged crates restore instead of recompiling. Both jobs below install
  # the sccache binary, so wiring RUSTC_WRAPPER at workflow scope is safe. Incremental must be off
  # for sccache to cache (release already defaults to 0; set it explicitly so it holds everywhere).
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  CARGO_INCREMENTAL: 0

jobs:
  # NOTE: the Conventional-Commit PR-title check lives in its own workflow (pr-title.yml) so it
  # re-runs when the title is EDITED — which this workflow's default pull_request trigger
  # (opened/synchronize/reopened) does not cover — without re-running the build/test matrix on
  # every title or description edit.

  # Fast lint pass (one OS): formatting + clippy. Fails the PR on warnings. PRs + main only — the
  # tag trigger above is just for `test`, so skip lint on tags.
  lint:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.9
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # The Rust engine + all unit tests build and pass on Linux. Runs on PRs and main as a per-push
  # gate so test regressions surface before merge — not just at release time. (The Swift/AppKit
  # shell is macOS-only and built separately; cross-platform parity is covered at release time.)
  test:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Caches ~/.cargo and target/, including the prebuilt V8 static lib — without this every
      # run re-downloads/links ~hundreds of MB of V8. The shared-key lets the WPT workflow restore
      # the same --release dependency cache (its Linux leg builds the identical dep set).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-deps
      - uses: mozilla-actions/sccache-action@v0.0.9
      # fonts-*: engine font tests need a system TTF (Linux runners ship none). pkg-config +
      # libglib2.0-dev: only needed when V8 is built from source (the fallback in "Build + test") —
      # GN's pkg_config probes glib during `gn gen`.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core fonts-liberation pkg-config libglib2.0-dev
      # The `ffi` crate is a cdylib that statically embeds V8; on Linux the V8 static lib's
      # thread-locals can't be linked into a shared object (R_X86_64_TPOFF32 against -shared). It's
      # the macOS-shell-only C ABI anyway (Linux/Windows shells link the engine crate directly),
      # so exclude it here.
      - name: Build + test
        run: |
          # The `v8` crate links a prebuilt `librusty_v8.a` that the Swatinem cache carries between
          # runs. If that lib isn't available (cache cleared, or a Cargo.lock change invalidated the
          # entry) the build fails fast at the V8 link step — so fall back to building V8 from source,
          # which produces the lib and seeds gn_out into the cache for subsequent runs.
          if ! cargo build --workspace --release --exclude ffi; then
            echo "::notice::prebuilt V8 unavailable — building V8 from source"
            export V8_FROM_SOURCE=1
            cargo build --workspace --release --exclude ffi
          fi
          cargo test --workspace --release --exclude ffi
