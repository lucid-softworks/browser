name: WPT

# Runs the Web Platform Tests the way other browsers are tested: the real `wpt run` harness driving
# our engine over WebDriver (crates/webdriver) via the `lucid` wptrunner product.
#
# `wpt run` launches a session per test, so the complete suite is divided into a generated matrix.
# Large areas are split into hash chunks; small areas are packed together. Every leg sparse-checks
# out only its assigned paths, keeping full-WPT coverage practical without cloning the entire WPT
# working tree hundreds of times.
#
# Runs NIGHTLY only (not on PRs): the full suite is slow and PR feedback comes from `ci.yml`
# (cargo fmt/clippy/test). Each leg uploads its raw `wptreport` JSON as an artifact; there is no
# aggregated report/PR-comment job.
#
# It does not gate on test failures (the engine has known, tracked failures); legs are also
# wall-bounded so a pathological hang can't stall the build.

on:
  schedule:
    - cron: '0 7 * * *' # nightly at 07:00 UTC

concurrency:
  group: wpt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Build a bounded, weighted matrix from the current upstream WPT tree. This covers every test area
  # while remaining below GitHub's 256-leg matrix limit.
  scope:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch WPT tree metadata
        run: git clone --depth 1 --filter=blob:none --sparse https://github.com/web-platform-tests/wpt.git wpt
      - id: gen
        run: |
          matrix=$(python3 scripts/wpt-matrix.py wpt)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # Build the WebDriver server ONCE and share the binary with every matrix leg via an artifact.
  # Otherwise each of the dozens of `wpt` legs recompiles + relinks the `webdriver` crate (the
  # Swatinem cache restores the V8 *dependencies*, but the workspace crate itself still builds per
  # leg). The binary statically embeds V8, so it's self-contained and portable across the identical
  # ubuntu-latest runners.
  webdriver:
    runs-on: ubuntu-latest
    # Content-addressed compiler cache so an unchanged tree restores the webdriver build instead of
    # recompiling the workspace nightly (rust-cache only caches the deps, not the workspace crates).
    # Scoped to this job: the `wpt` matrix legs run the prebuilt binary and never invoke rustc, so
    # they need neither the wrapper nor the sccache install.
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-deps
      - uses: mozilla-actions/sccache-action@v0.0.9
      # See ci.yml: fetch the matching prebuilt librusty_v8.a directly and point the crate at it via
      # RUSTY_V8_ARCHIVE, so the V8 native lib is provisioned deterministically (not cache-dependent).
      - name: Provision prebuilt V8 static lib
        run: |
          ver="$(cargo pkgid v8 | sed 's/.*@//')"
          url="https://github.com/denoland/rusty_v8/releases/download/v${ver}/librusty_v8_release_x86_64-unknown-linux-gnu.a.gz"
          echo "Fetching $url"
          curl -fL --retry 3 "$url" -o /tmp/librusty_v8.a.gz
          gunzip -f /tmp/librusty_v8.a.gz
          echo "RUSTY_V8_ARCHIVE=/tmp/librusty_v8.a" >> "$GITHUB_ENV"
      - name: Build WebDriver server
        run: cargo build --release -p webdriver
      - name: Upload WebDriver binary
        uses: actions/upload-artifact@v4
        with:
          name: webdriver-bin
          path: target/release/webdriver
          retention-days: 1

  wpt:
    needs: [scope, webdriver]
    name: wpt (${{ matrix.slug }} ${{ matrix.chunk }}/${{ matrix.chunks }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.scope.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      # The prebuilt WebDriver binary (from the `webdriver` job) — no cargo/Rust toolchain needed in
      # these legs, since `run-wpt.sh` uses `$WEBDRIVER_BIN` and skips its own build.
      - name: Download WebDriver server
        uses: actions/download-artifact@v4
        with:
          name: webdriver-bin
          path: bin
      - name: Make WebDriver executable
        run: chmod +x bin/webdriver

      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core fonts-liberation

      - name: Checkout web-platform-tests
        env:
          CHECKOUT_JSON: ${{ toJSON(matrix.checkout) }}
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/web-platform-tests/wpt.git wpt
          cd wpt
          # `css/support` holds shared CSS test helpers (e.g. interpolation-testcommon.js) that
          # testharness tests under css/ load via /css/support/*; `fonts` holds the Ahem test font
          # (and ahem.css) that layout tests load to get exact glyph metrics. Without them those
          # resources 404 — the helper test throws before registering subtests (area reports 0/0),
          # and Ahem-based geometry assertions measure with the fallback font. Add both for css/ areas.
          mapfile -t checkout_paths < <(jq -r '.[]' <<< "$CHECKOUT_JSON")
          git sparse-checkout set tools third_party docs resources common css/support fonts quirks interfaces images "${checkout_paths[@]}"

      - name: Map WPT hosts
        run: |
          cd wpt
          python3 ./wpt make-hosts-file | sudo tee -a /etc/hosts >/dev/null

      # Drive this chunk via `wpt run`, including every test type supported by the Lucid product
      # (testharness, reftest, wdspec, and crashtest). `--chunk-type hash` balances tests evenly
      # across chunks. A short timeout multiplier keeps unsupported-feature timeouts cheap. The run
      # is wall-bounded; `|| true` so failures / a cut-off never fail the build. `WEBDRIVER_BIN`
      # points `run-wpt.sh` at the prebuilt binary so it skips its own `cargo build`.
      - name: Run WPT via wpt run
        env:
          WEBDRIVER_BIN: ${{ github.workspace }}/bin/webdriver
          TESTS_JSON: ${{ toJSON(matrix.tests) }}
        run: |
          mkdir -p reports
          mapfile -t test_paths < <(jq -r '.[]' <<< "$TESTS_JSON")
          timeout 1500 scripts/run-wpt.sh "${test_paths[@]}" -- \
            --timeout-multiplier=0.25 \
            --total-chunks ${{ matrix.chunks }} \
            --this-chunk ${{ matrix.chunk }} \
            --chunk-type hash \
            --log-wptreport="$PWD/reports/${{ matrix.slug }}.json" \
          || true

      - name: Summarize chunk
        env:
          TESTS_JSON: ${{ toJSON(matrix.tests) }}
        run: |
          label=$(jq -r 'join(" ")' <<< "$TESTS_JSON")
          python3 - "$label" "reports/${{ matrix.slug }}.json" "reports/${{ matrix.slug }}.tsv" <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json, os, sys
          area, report, tsv = sys.argv[1], sys.argv[2], sys.argv[3]
          if not os.path.exists(report) or os.path.getsize(report) == 0:
              open(tsv, "w").write(f"{area}\t0\t0\tincomplete\n")
              print(f"`{area}` chunk — ⏳ incomplete (cut off before writing a report)")
              sys.exit(0)
          data = json.load(open(report))
          results = data.get("results", [])
          sp = sum(1 for t in results for s in t.get("subtests", []) if s["status"] == "PASS")
          st = sum(len(t.get("subtests", [])) for t in results)
          open(tsv, "w").write(f"{area}\t{sp}\t{st}\tok\n")
          print(f"`{area}` chunk — {len(results)} tests, {sp}/{st} subtests")
          PY

      - name: Upload chunk results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-result-${{ matrix.slug }}-${{ matrix.chunk }}
          path: reports/
