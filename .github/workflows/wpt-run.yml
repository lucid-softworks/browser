name: WPT

# Runs the Web Platform Tests the way other browsers are tested: the real `wpt run` harness driving
# our engine over WebDriver (crates/webdriver) via the `lucid` wptrunner product.
#
# `wpt run` launches a session per test, so a whole area (dom ≈ 600 files, fetch ≈ 540) is far too
# slow to run as a single leg. Instead each area is split into balanced CHUNKS (`wpt run
# --total-chunks/--this-chunk`) that run as parallel matrix legs, so wall-clock is roughly the
# slowest single chunk + per-leg setup. The `report` job sums an area's chunks back into one row.
# Same areas we've always tracked — just parallelized.
#
# It does not gate on test failures (the engine has known, tracked failures); legs are also
# wall-bounded so a pathological hang can't stall the build.

on:
  pull_request:
    paths-ignore: &paths-ignore
      - '**.md'
      - 'swift/**'
      - 'packaging/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore: *paths-ignore

concurrency:
  group: wpt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Build the chunked run matrix. Each `area:chunks` becomes `chunks` legs; chunk counts are sized so
  # every leg is ~150 test files (≈ the slowest tolerable leg). Edit AREAS to change coverage.
  scope:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    # `dir:chunks` per area; chunk counts are sized so each leg is ~150 test files (the slowest
    # tolerable leg). CSS2 flow/positioning subdirs and the modern CSS modules are tracked
    # individually rather than via the whole `css/` tree (tens of thousands of files) to keep the
    # matrix bounded. Edit AREAS to change coverage.
    env:
      AREAS: >-
        css/cssom:2 dom:4 domparsing:1 html/dom:3 url:1 fetch:4 service-workers:3
        css/CSS2/abspos:1 css/CSS2/box-display:1 css/CSS2/floats:1 css/CSS2/floats-clear:1
        css/CSS2/linebox:1 css/CSS2/margin-padding-clear:1 css/CSS2/normal-flow:2
        css/CSS2/positioning:2 css/CSS2/tables:2
        css/css-align:2 css/css-break:1 css/css-flexbox:4 css/css-grid:6 css/css-position:3
        css/css-sizing:2 css/css-text:8 css/css-tables:2
    steps:
      - id: gen
        run: |
          entries=""
          for ac in $AREAS; do
            dir="${ac%:*}"; chunks="${ac#*:}"; slug="${dir//\//-}"
            for c in $(seq 1 "$chunks"); do
              entries="${entries}{\"dir\":\"$dir\",\"slug\":\"$slug\",\"chunks\":$chunks,\"chunk\":$c}\n"
            done
          done
          matrix=$(printf "$entries" | jq -s -c '{include: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # Build the WebDriver server ONCE and share the binary with every matrix leg via an artifact.
  # Otherwise each of the dozens of `wpt` legs recompiles + relinks the `webdriver` crate (the
  # Swatinem cache restores the V8 *dependencies*, but the workspace crate itself still builds per
  # leg). The binary statically embeds V8, so it's self-contained and portable across the identical
  # ubuntu-latest runners.
  webdriver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-deps
      - name: Build WebDriver server
        run: cargo build --release -p webdriver
      - name: Upload WebDriver binary
        uses: actions/upload-artifact@v4
        with:
          name: webdriver-bin
          path: target/release/webdriver
          retention-days: 1

  wpt:
    needs: [scope, webdriver]
    name: wpt (${{ matrix.dir }} ${{ matrix.chunk }}/${{ matrix.chunks }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.scope.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      # The prebuilt WebDriver binary (from the `webdriver` job) — no cargo/Rust toolchain needed in
      # these legs, since `run-wpt.sh` uses `$WEBDRIVER_BIN` and skips its own build.
      - name: Download WebDriver server
        uses: actions/download-artifact@v4
        with:
          name: webdriver-bin
          path: bin
      - name: Make WebDriver executable
        run: chmod +x bin/webdriver

      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core fonts-liberation

      - name: Checkout web-platform-tests
        run: |
          git clone --filter=blob:none --sparse https://github.com/web-platform-tests/wpt.git wpt
          cd wpt
          git sparse-checkout set tools third_party docs resources common "${{ matrix.dir }}"

      - name: Map WPT hosts
        run: |
          cd wpt
          python3 ./wpt make-hosts-file | sudo tee -a /etc/hosts >/dev/null

      # Drive this chunk via `wpt run`. `--test-types testharness` avoids the aamtest accessibility
      # requirements (PyGObject/cairo, absent on the runner). `--chunk-type hash` balances tests
      # evenly across chunks. A short timeout multiplier keeps worker-variant timeouts cheap. The run
      # is wall-bounded; `|| true` so failures / a cut-off never fail the build. `WEBDRIVER_BIN`
      # points `run-wpt.sh` at the prebuilt binary so it skips its own `cargo build`.
      - name: Run WPT via wpt run
        env:
          WEBDRIVER_BIN: ${{ github.workspace }}/bin/webdriver
        run: |
          mkdir -p reports
          timeout 1500 scripts/run-wpt.sh "${{ matrix.dir }}" -- \
            --test-types testharness \
            --timeout-multiplier=0.25 \
            --total-chunks ${{ matrix.chunks }} \
            --this-chunk ${{ matrix.chunk }} \
            --chunk-type hash \
            --log-wptreport="$PWD/reports/${{ matrix.slug }}-${{ matrix.chunk }}.json" \
          || true

      - name: Summarize chunk
        run: |
          python3 - "${{ matrix.dir }}" "reports/${{ matrix.slug }}-${{ matrix.chunk }}.json" "reports/${{ matrix.slug }}-${{ matrix.chunk }}.tsv" <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json, os, sys
          area, report, tsv = sys.argv[1], sys.argv[2], sys.argv[3]
          if not os.path.exists(report) or os.path.getsize(report) == 0:
              open(tsv, "w").write(f"{area}\t0\t0\tincomplete\n")
              print(f"`{area}` chunk — ⏳ incomplete (cut off before writing a report)")
              sys.exit(0)
          data = json.load(open(report))
          results = data.get("results", [])
          sp = sum(1 for t in results for s in t.get("subtests", []) if s["status"] == "PASS")
          st = sum(len(t.get("subtests", [])) for t in results)
          open(tsv, "w").write(f"{area}\t{sp}\t{st}\tok\n")
          print(f"`{area}` chunk — {len(results)} tests, {sp}/{st} subtests")
          PY

      - name: Upload chunk results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-result-${{ matrix.slug }}-${{ matrix.chunk }}
          path: reports/

  report:
    needs: wpt
    if: always()
    runs-on: ubuntu-latest
    # Allow posting the comment directly for same-repo PRs (see "Comment on PR" below). Fork PRs get
    # a read-only token regardless, so they fall back to wpt-comment.yml (a workflow_run handler).
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wpt-result-*
          merge-multiple: true

      # Restore the latest main baseline (per-area pass/total). On a PR the exact key never matches,
      # so the `wpt-baseline-run-` prefix falls through to the newest cache — which only main writes
      # (caches created on the default branch are visible to PR runs). Absent before main has ever
      # cached; the report then shows "—" deltas.
      - name: Restore main baseline
        uses: actions/cache/restore@v4
        with:
          path: baseline
          key: wpt-baseline-run-${{ github.sha }}
          restore-keys: |
            wpt-baseline-run-

      - name: Build combined report
        run: |
          mkdir -p comment baseline
          python3 - artifacts comment/report.md baseline <<'PY'
          import glob, os, sys
          artifacts, out_md, basedir = sys.argv[1], sys.argv[2], sys.argv[3]
          # Sum each area's chunk results into one (pass, total, any-chunk-incomplete).
          areas, order = {}, []
          for f in sorted(glob.glob(os.path.join(artifacts, "*.tsv"))):
              for line in open(f):
                  area, p, t, st = line.rstrip("\n").split("\t")
                  if area not in areas:
                      areas[area] = [0, 0, False]; order.append(area)
                  rec = areas[area]
                  rec[0] += int(p); rec[1] += int(t)
                  rec[2] |= (st == "incomplete")
          slug = lambda a: a.replace("/", "-")
          def fmt(d):
              return f"+{d:,}" if d > 0 else (f"{d:,}" if d < 0 else "±0")
          # Read the restored baseline BEFORE we overwrite it with this run's numbers.
          base = {}
          for area in order:
              bf = os.path.join(basedir, slug(area) + ".tsv")
              if os.path.exists(bf):
                  base[area] = int(open(bf).read().split("\t")[1])
          out = ["## 🧪 WPT conformance (via `wpt run` over WebDriver)\n",
                 "| Area | Subtests | Pass rate | Δ vs `main` |",
                 "|------|----------|-----------|------------|"]
          tp = tt = tdelta = 0; have_base = False
          for area in order:
              p, t, inc = areas[area]
              tp += p; tt += t
              pct = f"{100*p/t:.1f}%" if t else "—"
              note = " ⚠️ partial" if inc else ""
              delta = "—"
              if area in base:
                  d = p - base[area]; delta = fmt(d); tdelta += d; have_base = True
              out.append(f"| `{area}` | {p:,} / {t:,} | {pct}{note} | {delta} |")
          total_pct = f"{100*tp/tt:.1f}%" if tt else "—"
          total_delta = fmt(tdelta) if have_base else "—"
          out.append(f"| **Total** | **{tp:,} / {tt:,}** | **{total_pct}** | **{total_delta}** |")
          out.append("\n<sub>Δ vs `main` is the change in passing subtests against the latest `main` baseline (`—` when none exists yet). web-platform-tests via the real `wpt run` harness driving the engine over WebDriver (`lucid` product); each area is sharded into parallel chunks. Worker-dependent variants time out (no worker support yet); ⚠️ partial means a chunk was cut off.</sub>")
          open(out_md, "w").write("\n".join(out) + "\n")
          # Publish this run's per-area numbers as the (new) baseline contents to be cached.
          for area in order:
              p, t, _ = areas[area]
              open(os.path.join(basedir, slug(area) + ".tsv"), "w").write(f"{area}\t{p}\t{t}\n")
          PY
          cat comment/report.md >> "$GITHUB_STEP_SUMMARY"

      # On main, publish this run's per-area numbers as the new baseline. The key is per-commit so the
      # save always succeeds (cache keys are immutable); PR runs pick it up via the restore-keys prefix.
      - name: Save main baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: baseline
          key: wpt-baseline-run-${{ github.sha }}

      # On PRs, stage the comment + PR number for wpt-comment.yml to post (a workflow_run handler, so
      # it works for fork PRs whose `pull_request` token is read-only). Pushes to main don't comment.
      - name: Stage PR comment
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > comment/pr-number.txt
      - name: Upload comment artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: wpt-comment
          path: comment/

      # Same-repo PRs can post directly (the token has write access), so the comment shows up on this
      # run. Fork PRs (read-only token) skip this and get the comment via wpt-comment.yml instead.
      - name: Comment on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: wpt-report
          number: ${{ github.event.pull_request.number }}
          path: comment/report.md
