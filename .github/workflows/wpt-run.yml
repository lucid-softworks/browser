name: WPT

# Runs the Web Platform Tests the way other browsers are tested: the real `wpt run` harness driving
# our engine over WebDriver (crates/webdriver) via the `lucid` wptrunner product. Each area runs on
# its own runner in parallel; each leg writes a wptreport, which the `report` job stitches into a
# pass-rate summary.
#
# Scope note: `wpt run` launches a full session per test and the engine has no worker support yet
# (worker variants time out), so large areas may not finish within a leg's budget. Legs are
# time-bounded and never fail the build on that — they report whatever completed ("incomplete" if a
# leg was cut off). This is the standard-conformance path; it does not gate on test failures (the
# engine has known, tracked failures).

on:
  pull_request:
    paths-ignore: &paths-ignore
      - '**.md'
      - 'swift/**'
      - 'packaging/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore: *paths-ignore

concurrency:
  group: wpt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wpt:
    name: wpt (${{ matrix.dir }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        # The WPT areas to drive via `wpt run`. `slug` mirrors `dir` with `/` -> `-` (artifact names
        # can't contain `/`).
        include:
          - { dir: "css/cssom", slug: "css-cssom" }
          - { dir: "dom", slug: "dom" }
          - { dir: "domparsing", slug: "domparsing" }
          - { dir: "html/dom", slug: "html-dom" }
          - { dir: "url", slug: "url" }
          - { dir: "fetch", slug: "fetch" }
          - { dir: "service-workers", slug: "service-workers" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-deps

      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core fonts-liberation

      - name: Checkout web-platform-tests
        run: |
          git clone --filter=blob:none --sparse https://github.com/web-platform-tests/wpt.git wpt
          cd wpt
          git sparse-checkout set tools third_party docs resources common "${{ matrix.dir }}"

      # `wpt serve` (started by `wpt run`) binds the WPT subdomains, so they must resolve to loopback.
      - name: Map WPT hosts
        run: |
          cd wpt
          python3 ./wpt make-hosts-file | sudo tee -a /etc/hosts >/dev/null

      - name: Build WebDriver server
        run: cargo build --release -p webdriver

      # Drive the area via `wpt run`. `--test-types testharness` avoids the aamtest accessibility
      # requirements (PyGObject/cairo, absent on the runner). A short timeout multiplier keeps
      # worker-variant timeouts cheap. The whole run is wall-bounded so a huge area can't hang the
      # leg; `|| true` so a non-zero exit (test failures, or being cut off) never fails the build.
      - name: Run WPT via wpt run
        run: |
          mkdir -p reports
          timeout 1500 scripts/run-wpt.sh "${{ matrix.dir }}" -- \
            --test-types testharness \
            --timeout-multiplier=0.25 \
            --log-wptreport="$PWD/reports/${{ matrix.slug }}.json" \
          || true

      - name: Summarize area
        run: |
          python3 - "${{ matrix.dir }}" "reports/${{ matrix.slug }}.json" "reports/${{ matrix.slug }}.tsv" <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json, os, sys
          area, report, tsv = sys.argv[1], sys.argv[2], sys.argv[3]
          if not os.path.exists(report) or os.path.getsize(report) == 0:
              # Leg was cut off before wpt run wrote a report (area too large for the budget).
              open(tsv, "w").write(f"{area}\t0\t0\tincomplete\n")
              print(f"### `{area}`\n\n⏳ incomplete — did not finish within the time budget.\n")
              sys.exit(0)
          data = json.load(open(report))
          results = data.get("results", [])
          sp = sum(1 for t in results for s in t.get("subtests", []) if s["status"] == "PASS")
          st = sum(len(t.get("subtests", [])) for t in results)
          pct = (100 * sp / st) if st else 0
          open(tsv, "w").write(f"{area}\t{sp}\t{st}\t{pct:.1f}%\n")
          print(f"### `{area}`\n\nTests: {len(results)} — Subtests: **{sp} / {st}** ({pct:.1f}%)\n")
          PY

      - name: Upload area results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-result-${{ matrix.slug }}
          path: reports/

  report:
    needs: wpt
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wpt-result-*
          merge-multiple: true
      - name: Build combined summary
        run: |
          {
            echo "## 🧪 WPT conformance (via \`wpt run\` over WebDriver)"
            echo
            echo "| Area | Subtests | Pass rate |"
            echo "|------|----------|-----------|"
            tp=0; tt=0
            for f in artifacts/*.tsv; do
              [ -f "$f" ] || continue
              IFS=$'\t' read -r area p t pct < "$f"
              if [ "$pct" = "incomplete" ]; then
                echo "| \`$area\` | — | ⏳ incomplete |"
              else
                echo "| \`$area\` | $p / $t | $pct |"
                tp=$((tp + p)); tt=$((tt + t))
              fi
            done
            total_pct=$(awk "BEGIN{printf \"%.1f%%\", ${tt}?100*${tp}/${tt}:0}")
            echo "| **Total (completed areas)** | **$tp / $tt** | **$total_pct** |"
            echo
            echo "<sub>web-platform-tests via the real \`wpt run\` harness driving the engine over WebDriver (\`lucid\` product). Worker-dependent variants time out (no worker support yet); large areas may be \`incomplete\` within the per-leg budget.</sub>"
          } >> "$GITHUB_STEP_SUMMARY"
