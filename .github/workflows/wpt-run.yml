name: WPT

# Runs the Web Platform Tests the way other browsers are tested: the real `wpt run` harness driving
# our engine over WebDriver (crates/webdriver) via the `lucid` wptrunner product.
#
# `wpt run` launches a session per test, so a whole area (dom ≈ 600 files, fetch ≈ 540) is far too
# slow to run as a single leg. Instead each area is split into balanced CHUNKS (`wpt run
# --total-chunks/--this-chunk`) that run as parallel matrix legs, so wall-clock is roughly the
# slowest single chunk + per-leg setup. The `report` job sums an area's chunks back into one row.
# Same areas we've always tracked — just parallelized.
#
# It does not gate on test failures (the engine has known, tracked failures); legs are also
# wall-bounded so a pathological hang can't stall the build.

on:
  pull_request:
    paths-ignore: &paths-ignore
      - '**.md'
      - 'swift/**'
      - 'packaging/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore: *paths-ignore

concurrency:
  group: wpt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Build the chunked run matrix. Each `area:chunks` becomes `chunks` legs; chunk counts are sized so
  # every leg is ~150 test files (≈ the slowest tolerable leg). Edit AREAS to change coverage.
  scope:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    env:
      AREAS: "css/cssom:2 dom:4 domparsing:1 html/dom:3 url:1 fetch:4 service-workers:3"
    steps:
      - id: gen
        run: |
          entries=""
          for ac in $AREAS; do
            dir="${ac%:*}"; chunks="${ac#*:}"; slug="${dir//\//-}"
            for c in $(seq 1 "$chunks"); do
              entries="${entries}{\"dir\":\"$dir\",\"slug\":\"$slug\",\"chunks\":$chunks,\"chunk\":$c}\n"
            done
          done
          matrix=$(printf "$entries" | jq -s -c '{include: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  wpt:
    needs: scope
    name: wpt (${{ matrix.dir }} ${{ matrix.chunk }}/${{ matrix.chunks }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.scope.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-deps

      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core fonts-liberation

      - name: Checkout web-platform-tests
        run: |
          git clone --filter=blob:none --sparse https://github.com/web-platform-tests/wpt.git wpt
          cd wpt
          git sparse-checkout set tools third_party docs resources common "${{ matrix.dir }}"

      - name: Map WPT hosts
        run: |
          cd wpt
          python3 ./wpt make-hosts-file | sudo tee -a /etc/hosts >/dev/null

      - name: Build WebDriver server
        run: cargo build --release -p webdriver

      # Drive this chunk via `wpt run`. `--test-types testharness` avoids the aamtest accessibility
      # requirements (PyGObject/cairo, absent on the runner). `--chunk-type hash` balances tests
      # evenly across chunks. A short timeout multiplier keeps worker-variant timeouts cheap. The run
      # is wall-bounded; `|| true` so failures / a cut-off never fail the build.
      - name: Run WPT via wpt run
        run: |
          mkdir -p reports
          timeout 1500 scripts/run-wpt.sh "${{ matrix.dir }}" -- \
            --test-types testharness \
            --timeout-multiplier=0.25 \
            --total-chunks ${{ matrix.chunks }} \
            --this-chunk ${{ matrix.chunk }} \
            --chunk-type hash \
            --log-wptreport="$PWD/reports/${{ matrix.slug }}-${{ matrix.chunk }}.json" \
          || true

      - name: Summarize chunk
        run: |
          python3 - "${{ matrix.dir }}" "reports/${{ matrix.slug }}-${{ matrix.chunk }}.json" "reports/${{ matrix.slug }}-${{ matrix.chunk }}.tsv" <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json, os, sys
          area, report, tsv = sys.argv[1], sys.argv[2], sys.argv[3]
          if not os.path.exists(report) or os.path.getsize(report) == 0:
              open(tsv, "w").write(f"{area}\t0\t0\tincomplete\n")
              print(f"`{area}` chunk — ⏳ incomplete (cut off before writing a report)")
              sys.exit(0)
          data = json.load(open(report))
          results = data.get("results", [])
          sp = sum(1 for t in results for s in t.get("subtests", []) if s["status"] == "PASS")
          st = sum(len(t.get("subtests", [])) for t in results)
          open(tsv, "w").write(f"{area}\t{sp}\t{st}\tok\n")
          print(f"`{area}` chunk — {len(results)} tests, {sp}/{st} subtests")
          PY

      - name: Upload chunk results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-result-${{ matrix.slug }}-${{ matrix.chunk }}
          path: reports/

  report:
    needs: wpt
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wpt-result-*
          merge-multiple: true
      - name: Build combined report
        run: |
          mkdir -p comment
          python3 - artifacts comment/report.md <<'PY'
          import glob, os, sys
          areas = {}  # area -> [pass, total, any_incomplete]
          order = []
          for f in sorted(glob.glob(os.path.join(sys.argv[1], "*.tsv"))):
              for line in open(f):
                  area, p, t, st = line.rstrip("\n").split("\t")
                  if area not in areas:
                      areas[area] = [0, 0, False]; order.append(area)
                  rec = areas[area]
                  rec[0] += int(p); rec[1] += int(t)
                  if st == "incomplete":
                      rec[2] = True
          out = []
          out.append("## 🧪 WPT conformance (via `wpt run` over WebDriver)\n")
          out.append("| Area | Subtests | Pass rate |")
          out.append("|------|----------|-----------|")
          tp = tt = 0
          for area in order:
              p, t, inc = areas[area]
              tp += p; tt += t
              pct = f"{100*p/t:.1f}%" if t else "—"
              note = " ⚠️ partial" if inc else ""
              out.append(f"| `{area}` | {p:,} / {t:,} | {pct}{note} |")
          total_pct = f"{100*tp/tt:.1f}%" if tt else "—"
          out.append(f"| **Total** | **{tp:,} / {tt:,}** | **{total_pct}** |")
          out.append("\n<sub>web-platform-tests via the real `wpt run` harness driving the engine over WebDriver (`lucid` product). Each area is sharded into parallel chunks. Worker-dependent variants time out (no worker support yet); ⚠️ partial means a chunk was cut off.</sub>")
          md = "\n".join(out) + "\n"
          open(sys.argv[2], "w").write(md)
          PY
          cat comment/report.md >> "$GITHUB_STEP_SUMMARY"

      # On PRs, stage the comment + PR number for wpt-comment.yml to post (a workflow_run handler, so
      # it works for fork PRs whose `pull_request` token is read-only). Pushes to main don't comment.
      - name: Stage PR comment
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > comment/pr-number.txt
      - name: Upload comment artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: wpt-comment
          path: comment/
