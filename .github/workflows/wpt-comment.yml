name: WPT comment

# Posts the WPT conformance report produced by the WPT workflow (wpt-run.yml) back onto the PR.
#
# Why this is a separate workflow: PRs from forks get a read-only GITHUB_TOKEN, so the WPT workflow
# (which runs on `pull_request`) can't post a comment — it fails with "Resource not accessible by
# integration". A `workflow_run` workflow instead runs in the base repository's context with a
# read-write token, even for fork PRs. It never checks out the PR's code — it only downloads the
# prebuilt comment artifact and posts it verbatim — so granting write access here is safe.
on:
  workflow_run:
    workflows: [WPT]
    types: [completed]

permissions:
  actions: read          # to download the artifact from the triggering run
  pull-requests: write   # to post/update the report comment

jobs:
  comment:
    # Only PR-triggered WPT runs stage the comment artifact; pushes to main don't.
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download comment artifact
        uses: actions/download-artifact@v4
        with:
          name: wpt-comment
          path: comment
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read PR number
        id: pr
        run: echo "number=$(cat comment/pr-number.txt)" >> "$GITHUB_OUTPUT"

      - name: Comment report on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: wpt-report
          number: ${{ steps.pr.outputs.number }}
          path: comment/report.md
