<!DOCTYPE html>
<html>
<head>
  <title>CSS demo</title>
  <style>
    body { color: #cccccc; }
    h1 { color: #5ec8ff; font-size: 34px; }
    .highlight { color: #80ff80; font-weight: bold; }
    #note { color: #ff8080; font-size: 20px; }
    .hidden { display: none; }
    p { font-size: 16px; }
  </style>
</head>
<body>
  <h1>Styled heading</h1>
  <p>This paragraph is the default body color.</p>
  <p class="highlight">This paragraph is green and bold via a class.</p>
  <p id="note">This one is red and larger via an id selector.</p>
  <p style="color: #ffd000; font-size: 24px;">This is yellow and large via an inline style attribute.</p>
  <p class="hidden">You should NOT see this hidden paragraph.</p>
</body>
</html>
